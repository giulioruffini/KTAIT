name: Lean Action CI

on:
  push:
    branches: [main]          # only main, not every branch
  pull_request:
  workflow_dispatch:

# A new run on the same ref cancels the previous in-flight run instead of stacking.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # hard backstop: no single run can run for hours
    steps:
      - uses: actions/checkout@v5
      # Builds the project and fetches the prebuilt Mathlib cache (no from-scratch
      # Mathlib recompile). Documentation generation (docgen-action) has been removed:
      # on a Mathlib-importing project it builds docs for the whole import closure
      # (multi-hour) and we do not publish Pages. Re-add it, gated to a release or
      # workflow_dispatch trigger, only if/when docs hosting is wanted.
      - uses: leanprover/lean-action@v1
      # The build proving is not enough: a renamed or restated theorem can leave the
      # status paper (and the papers that cite KTAIT by name) claiming something the
      # development no longer proves. This fails the run on that drift. Papers living
      # outside the repo are skipped here and checked by the local pre-push hook.
      - name: Lean / paper sync
        run: ./scripts/check_sync.sh
